<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLanSim - VLAN 拓扑模拟器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>VLanSim</h1>
      <p>轻量可视化 VLAN 学习模拟器（纯 HTML/CSS/JS）</p>
    </header>

    <div class="toolbar panel" id="topToolbar">
      <div class="toolbar-group" id="devicePalette"></div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button id="connectModeBtn">连接模式：关闭</button>
        <button id="clearBtn" class="danger">清空拓扑</button>
      </div>
      <p class="tip">提示：开启连接模式后，依次点击两个端口即可连线。按 ESC 退出连接模式。</p>
    </div>

    <main>
      <aside class="panel" id="leftPanel">
        <h2>流向模拟</h2>

        <div class="sim-group">
          <div class="sim-group-label">源</div>
          <label class="field"><span>设备</span><select id="simDeviceSelect"></select></label>
          <label class="field"><span>端口</span><select id="simPortSelect"></select></label>
        </div>

        <div class="sim-group">
          <div class="sim-group-label">目的</div>
          <label class="field"><span>设备</span><select id="simDstDeviceSelect"></select></label>
          <label class="field"><span>端口</span><select id="simDstPortSelect"></select></label>
        </div>

        <label class="field"><span>VLAN ID</span><input id="simVlanInput" type="number" min="1" max="4094" /></label>
        <button id="runSimBtn">▶ 运行模拟</button>

        <div class="sim-results-header">
          <h2>模拟结果</h2>
          <button id="clearLogBtn" class="btn-sm">清空</button>
        </div>
        <ol id="simLog" class="log"></ol>
      </aside>

      <section id="workspace">
        <div id="canvas" aria-label="拓扑画布"></div>
        <svg id="linkLayer"></svg>
      </section>

      <aside class="panel" id="rightPanel">
        <h2>设备配置</h2>
        <div id="deviceConfig" class="muted">请选择一个设备进行配置</div>
      </aside>
    </main>

    <script src="js/constants.js"></script>
    <script src="js/brands.js"></script>
    <script src="js/state.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/ui-topology.js"></script>
    <script src="js/ui-editor.js"></script>
    <script src="js/ui-simulation.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
